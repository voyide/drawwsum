<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Minkowski Draw</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0c0b11;
  --surface:#141320;
  --surface2:#1b1929;
  --border:#252335;
  --a:#ff2b6d;
  --b:#0cf0d0;
  --gold:#f0b429;
  --text:#ddd8f5;
  --muted:#5a5477;
  --mono:'JetBrains Mono',monospace;
  --disp:'Chakra Petch',sans-serif;
}
html,body{height:100%;width:100%;background:var(--bg);overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;}

.app{display:flex;flex-direction:column;height:100dvh;position:relative;}

/* ── Header ── */
.hdr{
  display:flex;align-items:center;gap:10px;
  padding:8px 14px;flex-shrink:0;
  background:var(--surface);
}
.logo{font-family:var(--disp);font-size:1.05rem;font-weight:700;color:#fff;letter-spacing:-.01em;flex-shrink:0;}
.logo span{color:var(--gold);transition:color 0.3s;}
.hdr-sep{flex:1;}

.sz-wrap{display:flex;align-items:center;gap:7px;}
.sz-ico{width:26px;height:26px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sz-dot{border-radius:50%;background:var(--text);transition:width .15s,height .15s;}
input[type=range]{-webkit-appearance:none;appearance:none;width:70px;height:3px;border-radius:2px;background:var(--border);outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:var(--text);border:2px solid var(--surface);cursor:pointer;}

.ico-btn{width:32px;height:32px;flex-shrink:0;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:var(--mono);}
.ico-btn:active{transform:scale(.93);}
.ico-btn.on{background:rgba(255,255,255,.08);border-color:var(--text);color:var(--text);}

/* ── Toolbar (Brushes & Colors) ── */
.toolbar{
  display:flex;align-items:center;gap:12px;
  padding:8px 14px;flex-shrink:0;
  background:var(--surface2);
  border-bottom:1px solid var(--border);
  overflow-x:auto;
}
.toolbar::-webkit-scrollbar{display:none;}
.tool-group{display:flex;align-items:center;gap:6px;}
.tool-sep{width:1px;height:20px;background:var(--border);flex-shrink:0;}

.t-btn{width:28px;height:28px;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--muted);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.t-btn:active{transform:scale(.9);}
.t-btn.active{background:rgba(255,255,255,.1);color:#fff;border-color:var(--border);}

.swatch{width:22px;height:22px;border-radius:50%;border:2px solid transparent;background:var(--c);cursor:pointer;transition:all .2s;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(0,0,0,.3);}
.swatch:active{transform:scale(.85);}
.swatch.active{border-color:#fff;transform:scale(1.15);box-shadow:0 0 8px var(--c);}

.clr-custom{background:var(--surface);border:1px solid var(--border);font-size:12px;}
.clr-custom.active{border-color:#fff;color:#fff;}

/* ── Canvas zone ── */
.cvs-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg);}
.cvs-wrap::before{content:'';position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(circle,rgba(255,255,255,.07) 1px,transparent 1px);background-size:22px 22px;}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;touch-action:none;}

.hint{position:absolute;top:14px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);pointer-events:none;transition:opacity .4s;white-space:nowrap;}
.hint.gone{opacity:0;}

.sum-msg{position:absolute;inset:0;display:none;align-items:center;justify-content:center;pointer-events:none;flex-direction:column;gap:10px;}
.sum-msg.show{display:flex;}
.sum-msg-title{font-family:var(--disp);font-size:1rem;font-weight:600;color:var(--muted);}
.sum-msg-sub{font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:#3a3558;}

.computing{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(12,11,17,.88);backdrop-filter:blur(6px);z-index:5;}
.computing.show{display:flex;}
.spin-ring{width:34px;height:34px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--gold);animation:spin .8s linear infinite;margin-right:12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin-lbl{font-family:var(--mono);font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text);}

/* ── Bottom ── */
.bottom{flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);transition:all .3s;}

.tabs{display:flex;border-bottom:1px solid var(--border);}
.tab{flex:1;padding:11px 4px;border:none;background:transparent;font-family:var(--mono);font-size:.63rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);cursor:pointer;position:relative;transition:color .3s, text-shadow .3s;}
.tab::after{content:'';position:absolute;bottom:0;left:12%;right:12%;height:2px;border-radius:2px;transform:scaleX(0);transition:transform .3s, background .3s;}
.tab[data-t="a"]::after{background:var(--a);}
.tab[data-t="b"]::after{background:var(--b);}
.tab[data-t="s"]::after{background:var(--gold);}
.tab.act{color:#fff;}
.tab[data-t="a"].act{color:var(--a);text-shadow:0 0 16px var(--a);}
.tab[data-t="b"].act{color:var(--b);text-shadow:0 0 14px var(--b);}
.tab[data-t="s"].act{color:var(--gold);text-shadow:0 0 14px var(--gold);}
.tab.act::after{transform:scaleX(1);}

.actions{display:flex;gap:8px;padding:9px 12px;}
.act-btn{flex:1;padding:9px 8px;border:1px solid var(--border);border-radius:9px;background:transparent;font-family:var(--mono);font-size:.62rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .3s;white-space:nowrap;}
.act-btn:active{transform:scale(.96);}
.act-btn.clr-a{border-color:var(--a);color:var(--a);opacity:0.7;}
.act-btn.clr-a:active{background:var(--a);color:#fff;}
.act-btn.clr-b{border-color:var(--b);color:var(--b);opacity:0.7;}
.act-btn.clr-b:active{background:var(--b);color:#fff;}
.act-btn.compute{flex:1.7;background:rgba(255,255,255,.04);border-color:var(--gold);color:var(--gold);}
.act-btn.compute:active{background:var(--gold);color:#000;}
.act-btn.compute:disabled{border-color:var(--border);color:var(--muted);background:transparent;cursor:not-allowed;transform:none;}
.act-btn.dl{border-color:rgba(221,216,245,.2);color:rgba(221,216,245,.55);}
.act-btn.dl:active{background:rgba(255,255,255,.05);}

/* ── Color Wheel Modal ── */
.wheel-overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:10;display:none;}
.wheel-pop{
  position:absolute;bottom:130px;left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(20,19,32,.95);backdrop-filter:blur(10px);
  border:1px solid var(--border);border-radius:16px;
  padding:16px;display:flex;flex-direction:column;align-items:center;gap:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
  opacity:0;pointer-events:none;transition:opacity .3s, transform .3s;z-index:11;
}
.wheel-pop.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;}
.wheel-container{position:relative;width:160px;height:160px;}
#wheelCanvas{width:100%;height:100%;border-radius:50%;cursor:crosshair;}
.wheel-cursor{
  position:absolute;width:12px;height:12px;border:2px solid #fff;border-radius:50%;
  transform:translate(-50%, -50%);pointer-events:none;box-shadow:0 0 4px rgba(0,0,0,.5);
}
.lum-wrap{display:flex;width:100%;align-items:center;gap:8px;}
.lum-track{
  flex:1;height:12px;border-radius:6px;background:linear-gradient(to right, #000, #fff);
  position:relative;cursor:pointer;border:1px solid rgba(255,255,255,.2);
}
.lum-thumb{
  position:absolute;top:50%;transform:translate(-50%,-50%);
  width:16px;height:16px;background:#fff;border-radius:50%;box-shadow:0 0 4px rgba(0,0,0,.5);pointer-events:none;
}

/* toast */
.toast{position:absolute;bottom:100px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 18px;font-family:var(--mono);font-size:.63rem;color:var(--text);white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .22s,transform .22s;z-index:20;}
.toast.pop{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="app">

  <header class="hdr">
    <div class="logo">M<span>⊕</span>NKOWSKI</div>
    <div class="hdr-sep"></div>
    <div class="sz-wrap">
      <div class="sz-ico"><div class="sz-dot" id="szDot" style="width:8px;height:8px;"></div></div>
      <input type="range" id="sizeSlider" min="3" max="54" value="16">
    </div>
    <button class="ico-btn" id="btnEraser" title="Eraser">⌫</button>
  </header>

  <div class="toolbar">
    <div class="tool-group" id="brushPicker">
      <button class="t-btn active" data-b="hard" title="Hard Brush">●</button>
      <button class="t-btn" data-b="soft" title="Soft Brush">☁</button>
      <button class="t-btn" data-b="block" title="Block Brush">■</button>
      <button class="t-btn" data-b="spray" title="Spray Brush">⁂</button>
    </div>
    <div class="tool-sep"></div>
    <div class="tool-group" id="colorPicker">
      <div class="swatch" data-c="#ff2b6d" style="--c:#ff2b6d"></div>
      <div class="swatch" data-c="#0cf0d0" style="--c:#0cf0d0"></div>
      <div class="swatch" data-c="#f0b429" style="--c:#f0b429"></div>
      <div class="swatch" data-c="#9d72ff" style="--c:#9d72ff"></div>
      <div class="swatch" data-c="#ffffff" style="--c:#ffffff"></div>
      <div class="swatch clr-custom" id="btnCustomColor" title="Color Wheel" style="--c:#141320; display:flex;align-items:center;justify-content:center;">🎨</div>
    </div>
  </div>

  <div class="cvs-wrap" id="cvsWrap">
    <canvas id="canvas"></canvas>
    <div class="hint" id="hint">draw shape A — fill it in</div>
    <div class="sum-msg" id="sumMsg">
      <div class="sum-msg-title">No sum computed</div>
      <div class="sum-msg-sub">Draw A &amp; B · then hit Compute</div>
    </div>
    <div class="computing" id="computing">
      <div class="spin-ring"></div>
      <div class="spin-lbl">Computing sum…</div>
    </div>
  </div>

  <div class="bottom">
    <div class="tabs">
      <button class="tab act" data-t="a" id="tA">◈ Shape A</button>
      <button class="tab"     data-t="b" id="tB">◈ Shape B</button>
      <button class="tab"     data-t="s" id="tS">A ⊕ B</button>
    </div>
    <div class="actions">
      <button class="act-btn clr-a" id="btnClear">Clear A</button>
      <button class="act-btn compute" id="btnCompute" disabled>⊕ Compute</button>
      <button class="act-btn dl" id="btnDl">↓ Save</button>
    </div>
  </div>

  <div class="wheel-overlay" id="wheelOverlay"></div>
  <div class="wheel-pop" id="wheelPop">
    <div class="wheel-container">
      <canvas id="wheelCanvas" width="160" height="160"></canvas>
      <div class="wheel-cursor" id="wheelCursor" style="left:50%; top:50%;"></div>
    </div>
    <div class="lum-wrap">
      <div class="lum-track" id="lumTrack">
        <div class="lum-thumb" id="lumThumb" style="left:50%;"></div>
      </div>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
// ══════════════ STATE ══════════════
const dpr    = window.devicePixelRatio || 1;
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

const offA = document.createElement('canvas');
const offB = document.createElement('canvas');
const ctxA = offA.getContext('2d');
const ctxB = offB.getContext('2d');

let sumCanvas = null;
let activeTab = 'a';
let activeBrush = 'hard';
let eraser    = false;
let brushSize = 16;
let drawing   = false;
let prevPt    = null;
let prevMid   = null;
let dirtyA    = false;
let dirtyB    = false;

let colorA = '#ff2b6d';
let colorB = '#0cf0d0';

// ══════════════ REFS ══════════════
const hint      = document.getElementById('hint');
const sumMsg    = document.getElementById('sumMsg');
const computing = document.getElementById('computing');
const btnEraser = document.getElementById('btnEraser');
const btnClear  = document.getElementById('btnClear');
const btnCompute= document.getElementById('btnCompute');
const btnDl     = document.getElementById('btnDl');
const sizeSlider= document.getElementById('sizeSlider');
const szDot     = document.getElementById('szDot');
const tA = document.getElementById('tA'), tB = document.getElementById('tB'), tS = document.getElementById('tS');
const toastEl   = document.getElementById('toast');
const rootStyle = document.documentElement.style;

// ══════════════ RESIZE ══════════════
function resize() {
  const wrap = canvas.parentElement;
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const pW = Math.round(W * dpr), pH = Math.round(H * dpr);

  function snap(off) {
    if (!off.width) return null;
    const t = document.createElement('canvas');
    t.width = off.width; t.height = off.height;
    t.getContext('2d').drawImage(off, 0, 0);
    return t;
  }
  const sA = snap(offA), sB = snap(offB);

  canvas.width = pW; canvas.height = pH;
  canvas.style.width  = W + 'px'; canvas.style.height = H + 'px';
  offA.width = pW; offA.height = pH;
  offB.width = pW; offB.height = pH;

  if (sA) ctxA.drawImage(sA, 0, 0, pW, pH);
  if (sB) ctxB.drawImage(sB, 0, 0, pW, pH);
  render();
}
window.addEventListener('resize', resize);

// ══════════════ RENDER ══════════════
function render() {
  const pW = canvas.width, pH = canvas.height;
  ctx.clearRect(0, 0, pW, pH);

  if (activeTab === 'a') {
    sumMsg.classList.remove('show');
    ctx.drawImage(offA, 0, 0);
  } else if (activeTab === 'b') {
    sumMsg.classList.remove('show');
    ctx.drawImage(offB, 0, 0);
  } else {
    if (sumCanvas) {
      sumMsg.classList.remove('show');
      ctx.globalAlpha = 0.12;
      ctx.drawImage(offA, 0, 0);
      ctx.drawImage(offB, 0, 0);
      ctx.globalAlpha = 1;
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(sumCanvas, 0, 0, sumCanvas.width, sumCanvas.height, 0, 0, pW, pH);
      ctx.imageSmoothingEnabled = true;
    } else {
      sumMsg.classList.add('show');
    }
  }
}

// ══════════════ DRAWING SYSTEM ══════════════
function evXY(e) {
  const r = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: (src.clientX - r.left) * dpr, y: (src.clientY - r.top) * dpr };
}

function setupCtx(c) {
  const col = activeTab === 'a' ? colorA : colorB;
  c.lineWidth = brushSize * dpr;
  c.lineJoin = activeBrush === 'block' ? 'miter' : 'round';
  c.lineCap = activeBrush === 'block' ? 'square' : 'round';
  
  if (eraser) {
    c.globalCompositeOperation = 'destination-out';
    c.shadowBlur = 0;
    c.fillStyle = c.strokeStyle = 'rgba(0,0,0,1)';
    return;
  }
  
  c.globalCompositeOperation = 'source-over';
  c.strokeStyle = col;
  c.fillStyle = col;

  if (activeBrush === 'soft') {
    c.shadowColor = col;
    c.shadowBlur = Math.min(brushSize * dpr * 0.5, 22);
  } else {
    c.shadowBlur = 0;
  }
}

function drawSpray(c, x, y, size) {
  const r = size / 2;
  const count = Math.max(5, Math.floor(size * 0.8));
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const radius = Math.random() * r;
    const px = x + Math.cos(angle) * radius;
    const py = y + Math.sin(angle) * radius;
    c.fillRect(px, py, dpr * 1.5, dpr * 1.5);
  }
}

canvas.addEventListener('pointerdown', e => {
  if (activeTab === 's') return;
  e.preventDefault();
  canvas.setPointerCapture(e.pointerId);
  drawing = true;
  const pt = evXY(e);
  prevPt = prevMid = pt;

  const c = activeTab === 'a' ? ctxA : ctxB;
  setupCtx(c);
  
  if (activeBrush === 'spray' && !eraser) {
    drawSpray(c, pt.x, pt.y, brushSize * dpr);
  } else {
    c.beginPath();
    if (activeBrush === 'block') {
      const s = (brushSize * dpr) / 2;
      c.fillRect(pt.x - s, pt.y - s, s * 2, s * 2);
    } else {
      c.arc(pt.x, pt.y, (brushSize * dpr) / 2, 0, Math.PI * 2);
      c.fill();
    }
  }
  
  hint.classList.add('gone');
  render();
});

canvas.addEventListener('pointermove', e => {
  if (!drawing) return;
  e.preventDefault();
  const pt = evXY(e);
  const c  = activeTab === 'a' ? ctxA : ctxB;
  setupCtx(c);

  if (activeBrush === 'spray' && !eraser) {
    const dist = Math.hypot(pt.x - prevPt.x, pt.y - prevPt.y);
    const steps = Math.max(1, Math.ceil(dist / (brushSize * 0.25)));
    for (let i = 0; i <= steps; i++) {
      const cx = prevPt.x + (pt.x - prevPt.x) * (i / steps);
      const cy = prevPt.y + (pt.y - prevPt.y) * (i / steps);
      drawSpray(c, cx, cy, brushSize * dpr);
    }
  } else {
    const mx = (prevPt.x + pt.x) / 2;
    const my = (prevPt.y + pt.y) / 2;
    c.beginPath();
    c.moveTo(prevMid.x, prevMid.y);
    c.quadraticCurveTo(prevPt.x, prevPt.y, mx, my);
    c.stroke();
    prevMid = { x: mx, y: my };
  }
  
  prevPt = pt;
  if (activeTab === 'a') dirtyA = true;
  else                   dirtyB = true;
  updateUI();
  render();
});

canvas.addEventListener('pointerup', e => {
  if (!drawing) return;
  drawing = false;
  const c = activeTab === 'a' ? ctxA : ctxB;
  if (activeBrush !== 'spray' || eraser) {
    setupCtx(c);
    c.beginPath();
    c.moveTo(prevMid.x, prevMid.y);
    c.lineTo(prevPt.x, prevPt.y);
    c.stroke();
  }
  render();
});
canvas.addEventListener('pointercancel', () => { drawing = false; });


// ══════════════ COLOR WHEEL LOGIC ══════════════
const wheelOverlay = document.getElementById('wheelOverlay');
const wheelPop     = document.getElementById('wheelPop');
const wheelCanvas  = document.getElementById('wheelCanvas');
const wctx         = wheelCanvas.getContext('2d');
const wheelCursor  = document.getElementById('wheelCursor');
const lumTrack     = document.getElementById('lumTrack');
const lumThumb     = document.getElementById('lumThumb');

let wheelHue = 0;
let wheelSat = 0;
let wheelLum = 50;
let wheelDragging = false;
let lumDragging = false;

function hslToHex(h, s, l) {
  l /= 100;
  const a = s * Math.min(l, 1 - l) / 100;
  const f = n => {
    const k = (n + h / 30) % 12;
    const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
    return Math.round(255 * color).toString(16).padStart(2, '0');
  };
  return `#${f(0)}${f(8)}${f(4)}`;
}

function drawWheel() {
  const w = wheelCanvas.width, h = wheelCanvas.height;
  const cx = w/2, cy = h/2, r = w/2;
  wctx.clearRect(0,0,w,h);
  for(let angle=0; angle<360; angle++) {
    wctx.beginPath(); wctx.moveTo(cx, cy);
    wctx.arc(cx, cy, r, (angle-0.5)*Math.PI/180, (angle+1.5)*Math.PI/180);
    wctx.fillStyle = `hsl(${angle}, 100%, ${wheelLum}%)`;
    wctx.fill();
  }
  const grad = wctx.createRadialGradient(cx,cy,0, cx,cy,r);
  grad.addColorStop(0, `hsl(0, 0%, ${wheelLum}%)`);
  grad.addColorStop(1, `hsla(0, 0%, ${wheelLum}%, 0)`);
  wctx.fillStyle = grad;
  wctx.beginPath(); wctx.arc(cx,cy,r,0,Math.PI*2); wctx.fill();
}

function updateWheelColorFromInput(x, y, wRect) {
  const cx = wRect.width / 2, cy = wRect.height / 2;
  const r = wRect.width / 2;
  const dx = x - cx, dy = y - cy;
  const dist = Math.min(r, Math.sqrt(dx*dx + dy*dy));
  
  wheelSat = (dist / r) * 100;
  wheelHue = (Math.atan2(dy, dx) * 180 / Math.PI);
  if (wheelHue < 0) wheelHue += 360;

  const curX = cx + Math.cos(wheelHue * Math.PI / 180) * dist;
  const curY = cy + Math.sin(wheelHue * Math.PI / 180) * dist;
  wheelCursor.style.left = `${(curX / wRect.width) * 100}%`;
  wheelCursor.style.top = `${(curY / wRect.height) * 100}%`;

  applyWheelColor();
}

function updateLumFromInput(x, trackRect) {
  const pct = Math.max(0, Math.min(1, (x - trackRect.left) / trackRect.width));
  wheelLum = pct * 100;
  lumThumb.style.left = `${pct * 100}%`;
  drawWheel();
  applyWheelColor();
}

function applyWheelColor() {
  const hex = hslToHex(wheelHue, wheelSat, wheelLum);
  document.getElementById('btnCustomColor').style.setProperty('--c', hex);
  setColor(hex);
}

// Wheel Interactions
wheelCanvas.addEventListener('pointerdown', e => {
  wheelDragging = true; wheelCanvas.setPointerCapture(e.pointerId);
  updateWheelColorFromInput(e.offsetX, e.offsetY, wheelCanvas.getBoundingClientRect());
});
wheelCanvas.addEventListener('pointermove', e => {
  if (!wheelDragging) return;
  updateWheelColorFromInput(e.offsetX, e.offsetY, wheelCanvas.getBoundingClientRect());
});
wheelCanvas.addEventListener('pointerup', () => wheelDragging = false);

lumTrack.addEventListener('pointerdown', e => {
  lumDragging = true; lumTrack.setPointerCapture(e.pointerId);
  updateLumFromInput(e.clientX, lumTrack.getBoundingClientRect());
});
lumTrack.addEventListener('pointermove', e => {
  if (!lumDragging) return;
  updateLumFromInput(e.clientX, lumTrack.getBoundingClientRect());
});
lumTrack.addEventListener('pointerup', () => lumDragging = false);


document.getElementById('btnCustomColor').addEventListener('click', () => {
  drawWheel();
  wheelOverlay.style.display = 'block';
  setTimeout(() => wheelPop.classList.add('show'), 10);
});

wheelOverlay.addEventListener('click', () => {
  wheelPop.classList.remove('show');
  setTimeout(() => wheelOverlay.style.display = 'none', 300);
});


// ══════════════ COLOR & BRUSH UI ══════════════
document.getElementById('brushPicker').addEventListener('click', e => {
  const btn = e.target.closest('.t-btn');
  if (!btn) return;
  document.querySelectorAll('#brushPicker .t-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeBrush = btn.dataset.b;
  eraser = false; updateEraserUI();
});

document.getElementById('colorPicker').addEventListener('click', e => {
  if (activeTab === 's') { showToast("Draw in A or B to pick colors"); return; }
  const swatch = e.target.closest('.swatch');
  if (!swatch || swatch.id === 'btnCustomColor') return;
  setColor(swatch.dataset.c);
});

function setColor(hex) {
  if (activeTab === 'a') { colorA = hex; }
  else if (activeTab === 'b') { colorB = hex; }
  updateTheme();
}

function updateTheme() {
  rootStyle.setProperty('--a', colorA);
  rootStyle.setProperty('--b', colorB);
  
  const col = activeTab === 'a' ? colorA : colorB;
  document.querySelectorAll('.swatch').forEach(s => {
    if(s.dataset.c) s.classList.toggle('active', s.dataset.c.toLowerCase() === col.toLowerCase());
  });
  const customBtn = document.getElementById('btnCustomColor');
  customBtn.classList.toggle('active', 
    !Array.from(document.querySelectorAll('.swatch[data-c]')).some(s => s.dataset.c.toLowerCase() === col.toLowerCase())
  );
}


// ══════════════ UI & TABS ══════════════
function switchTab(t) {
  activeTab = t;
  [tA, tB, tS].forEach(el => el.classList.remove('act'));
  ({ a: tA, b: tB, s: tS }[t]).classList.add('act');
  updateTheme();
  updateUI();
  render();
}
tA.addEventListener('click', () => switchTab('a'));
tB.addEventListener('click', () => switchTab('b'));
tS.addEventListener('click', () => switchTab('s'));

function updateUI() {
  btnCompute.disabled = !(dirtyA && dirtyB);
  if (activeTab === 's') {
    btnClear.style.display = 'none';
  } else {
    btnClear.style.display = '';
    const isA = activeTab === 'a';
    btnClear.textContent = isA ? 'Clear A' : 'Clear B';
    btnClear.className   = 'act-btn ' + (isA ? 'clr-a' : 'clr-b');
  }
  if (activeTab === 'a' && !dirtyA) { hint.textContent = 'draw shape A — fill it in'; hint.classList.remove('gone'); } 
  else if (activeTab === 'b' && !dirtyB) { hint.textContent = 'draw shape B — fill it in'; hint.classList.remove('gone'); } 
  else { hint.classList.add('gone'); }
}

btnClear.addEventListener('click', () => {
  if (activeTab === 'a') { ctxA.clearRect(0,0,offA.width,offA.height); dirtyA=false; }
  else                   { ctxB.clearRect(0,0,offB.width,offB.height); dirtyB=false; }
  sumCanvas = null;
  updateUI(); render();
});

sizeSlider.addEventListener('input', () => {
  brushSize = parseInt(sizeSlider.value);
  const s = Math.max(4, Math.min(brushSize * 0.5, 24));
  szDot.style.width = szDot.style.height = s + 'px';
});

function updateEraserUI() {
  btnEraser.classList.toggle('on', eraser);
  btnEraser.textContent = eraser ? '✏' : '⌫';
}
btnEraser.addEventListener('click', () => {
  eraser = !eraser;
  updateEraserUI();
});

// ══════════════ TRUE MULTI-COLOR MINKOWSKI SUM ══════════════
const CW = 80, CH = 120; // computation resolution

function sampleColoredMask(off) {
  const tmp = document.createElement('canvas');
  tmp.width = CW; tmp.height = CH;
  const c = tmp.getContext('2d');
  c.drawImage(off, 0, 0, off.width, off.height, 0, 0, CW, CH);
  const data = c.getImageData(0, 0, CW, CH).data;
  const px = [];
  for (let y = 0; y < CH; y++) {
    for (let x = 0; x < CW; x++) {
      const i = (y * CW + x) * 4;
      if (data[i + 3] > 40) { // Solid enough to count
        px.push({ x, y, r: data[i], g: data[i+1], b: data[i+2] });
      }
    }
  }
  return px;
}

function runMinkowski() {
  const pA = sampleColoredMask(offA), pB = sampleColoredMask(offB);
  if (!pA.length || !pB.length) return null;

  const RW = CW * 2 - 1, RH = CH * 2 - 1;
  // Use Float32Array to accumulate colors (R, G, B, Count)
  const result = new Float32Array(RW * RH * 4);

  for (const a of pA) {
    for (const b of pB) {
      const idx = ((a.y + b.y) * RW + (a.x + b.x)) * 4;
      result[idx]     += (a.r + b.r) * 0.5;
      result[idx + 1] += (a.g + b.g) * 0.5;
      result[idx + 2] += (a.b + b.b) * 0.5;
      result[idx + 3] += 1; // Increment contributions count
    }
  }

  const img = new ImageData(RW, RH);
  const d = img.data;
  for (let i = 0; i < RW * RH; i++) {
    const count = result[i * 4 + 3];
    if (count > 0) {
      d[i * 4]     = result[i * 4]     / count; // Average R
      d[i * 4 + 1] = result[i * 4 + 1] / count; // Average G
      d[i * 4 + 2] = result[i * 4 + 2] / count; // Average B
      d[i * 4 + 3] = 255;                       // Solid Alpha
    }
  }

  const out = document.createElement('canvas');
  out.width = RW; out.height = RH;
  out.getContext('2d').putImageData(img, 0, 0);
  return out;
}

btnCompute.addEventListener('click', () => {
  computing.classList.add('show');
  requestAnimationFrame(() => requestAnimationFrame(() => {
    sumCanvas = runMinkowski();
    computing.classList.remove('show');
    if (sumCanvas) { switchTab('s'); showToast('Minkowski sum ready ⊕'); }
    else           { showToast('Nothing to sum — draw in both shapes first'); }
  }));
});

// ══════════════ DOWNLOAD ══════════════
btnDl.addEventListener('click', () => {
  const PW = 480, PH = 720, PAD = 20, LBL = 44;
  const totalW = PW * 3 + PAD * 4, totalH = PH + LBL + PAD * 2 + 34;

  const out = document.createElement('canvas');
  out.width = totalW; out.height = totalH;
  const c = out.getContext('2d');

  c.fillStyle = '#0c0b11'; c.fillRect(0, 0, totalW, totalH);
  c.fillStyle = 'rgba(255,255,255,.055)';
  for (let gx = 11; gx < totalW; gx += 22)
    for (let gy = 11; gy < totalH; gy += 22) { c.beginPath(); c.arc(gx, gy, .85, 0, Math.PI * 2); c.fill(); }

  function rrect(x, y, w, h, r) { c.beginPath(); c.roundRect(x, y, w, h, r); }

  function panel(src, px, py, label, col) {
    const fH = PH + LBL;
    c.fillStyle = '#141320'; rrect(px, py, PW, fH, 13); c.fill();
    c.strokeStyle = col; c.lineWidth = 2; rrect(px, py, PW, fH, 13); c.stroke();

    c.font = `700 13px 'JetBrains Mono',monospace`; c.fillStyle = col;
    c.textAlign = 'center'; c.textBaseline = 'middle'; c.fillText(label, px + PW / 2, py + LBL / 2);

    if (src) {
      c.save(); rrect(px, py + LBL, PW, PH, 0); c.clip();
      c.imageSmoothingEnabled = false;
      c.drawImage(src, 0, 0, src.width, src.height, px, py + LBL, PW, PH);
      c.imageSmoothingEnabled = true; c.restore();
    } else {
      c.font = `400 11px 'JetBrains Mono',monospace`; c.fillStyle = '#3a3558';
      c.fillText('(empty)', px + PW / 2, py + LBL + PH / 2);
    }
  }

  const y0 = PAD;
  panel(offA.width ? offA : null, PAD,            y0, 'SHAPE A', colorA);
  panel(offB.width ? offB : null, PAD*2 + PW,     y0, 'SHAPE B', colorB);
  panel(sumCanvas,                PAD*3 + PW*2,   y0, 'A \u2295 B', '#f0b429');

  c.font = `400 10px 'JetBrains Mono',monospace`; c.fillStyle = '#3a3558';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText('M\u2295NKOWSKI DRAW', totalW / 2, totalH - 17);

  const link = document.createElement('a'); link.download = 'minkowski-sum.png';
  link.href = out.toDataURL('image/png'); link.click();
});

// ══════════════ TOAST & INIT ══════════════
let toastTimer;
function showToast(msg) {
  toastEl.textContent = msg; toastEl.classList.add('pop');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('pop'), 2400);
}

resize();
updateTheme();
updateUI();
</script>
